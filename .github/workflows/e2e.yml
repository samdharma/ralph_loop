name: e2e

# Per docs/IMPROVEMENT_ROADMAP_SPEC.md §8.5 and §10.
# Runs the E2E test against samdharma/ralph-e2e-test, gated on RALPH_E2E=1.
# Triggers: workflow_dispatch (manual) or push to ralph-v3.1.

on:
  workflow_dispatch:
  push:
    branches:
      - ralph-v3.1
  pull_request:
    branches:
      - ralph-v3.1

permissions:
  contents: read
  issues: write   # E2E creates issues on samdharma/ralph-e2e-test

jobs:
  e2e:
    name: E2E (ralph-e2e-test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Ralph
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ralph dependencies
        run: |
          python -m pip install --upgrade pip
          # Pinned dependencies that the test suite needs.
          pip install pytest pyyaml ghapi

      - name: Run E2E tests
        env:
          RALPH_E2E: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pytest tests/e2e/test_ralph_e2e_repo.py -v --tb=short
        continue-on-error: false